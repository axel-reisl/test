# Nginx Configuration for iPXE Server
# Save as: /etc/nginx/sites-available/ipxe-server
# Enable with: sudo ln -s /etc/nginx/sites-available/ipxe-server /etc/nginx/sites-enabled/

upstream ipxe_backend {
    server 127.0.0.1:80;
}

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name your-server.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-server.com;

    # SSL Certificates
    ssl_certificate /etc/ssl/certs/your-cert.pem;
    ssl_certificate_key /etc/ssl/private/your-key.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Logging
    error_log /var/log/nginx/ipxe-error.log;
    access_log /var/log/nginx/ipxe-access.log combined buffer=32k flush=5s;

    # Root directory
    root /var/www/ipxe;

    # iPXE scripts - serve as text/plain
    location /ipxe/ {
        default_type text/plain;
        expires 5m;
        add_header Cache-Control "public, max-age=300";
    }

    # ISO files - large file support
    location /iso/ {
        # Large file support
        client_max_body_size 10G;
        
        # Cache ISOs for 7 days
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        
        # Enable byte range requests for resumable downloads
        add_header Accept-Ranges bytes;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Directory listing (optional - remove for production)
    autoindex on;
    autoindex_format json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
