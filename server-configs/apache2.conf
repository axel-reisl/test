# Apache2 Configuration for iPXE Server
# Save as: /etc/apache2/sites-available/ipxe-server.conf
# Enable with: sudo a2ensite ipxe-server

<VirtualHost *:443>
    ServerName your-server.com
    ServerAdmin admin@your-server.com

    DocumentRoot /var/www/ipxe

    # SSL Configuration
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/your-cert.pem
    SSLCertificateKeyFile /etc/ssl/private/your-key.pem
    SSLProtocol -all +TLSv1.2 +TLSv1.3
    SSLCipherSuite HIGH:!aNULL:!MD5

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/ipxe-error.log
    CustomLog ${APACHE_LOG_DIR}/ipxe-access.log combined

    # iPXE boot scripts - serve as text/plain
    <Directory /var/www/ipxe/ipxe>
        AddType text/plain .ipxe
        Options +FollowSymLinks +Indexes
        AllowOverride None
        Require all granted
    </Directory>

    # ISO files - large file support
    <Directory /var/www/ipxe/iso>
        Options +FollowSymLinks +Indexes
        AllowOverride None
        Require all granted
        
        # Cache control for ISOs
        Header set Cache-Control "public, max-age=604800, immutable"
    </Directory>

    # Deny access to hidden files
    <FilesMatch "^\\.">
        Require all denied
    </FilesMatch>

    # Gzip compression for smaller transfers (optional)
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/plain text/html text/xml
    </IfModule>
</VirtualHost>

# HTTP to HTTPS redirect
<VirtualHost *:80>
    ServerName your-server.com
    Redirect permanent / https://your-server.com/
</VirtualHost>
